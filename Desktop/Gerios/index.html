<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Message For You</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --red: #ff1a1a;
    --dark: #060d06;
    --cream: #f5f0e8;
    --orange: #ff6b00;
    --green: #2d6a2d;
    --green-bright: #4a9e4a;
  }

  body {
    background: var(--dark);
    color: var(--cream);
    font-family: 'Bebas Neue', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: crosshair;
  }

  /* Animated noise grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.4;
    z-index: 10;
  }

  .bg-lines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 40px,
      rgba(45,106,45,0.08) 40px,
      rgba(45,106,45,0.08) 41px
    );
    pointer-events: none;
  }

  .container {
    text-align: center;
    position: relative;
    z-index: 2;
    padding: 2rem;
  }

  .intro {
    font-family: 'Permanent Marker', cursive;
    font-size: clamp(1rem, 3vw, 1.4rem);
    color: #888;
    letter-spacing: 0.15em;
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.3s;
  }

  .main-text {
    font-size: clamp(5rem, 20vw, 18rem);
    line-height: 0.85;
    letter-spacing: -0.02em;
    color: var(--cream);
    text-transform: uppercase;
    position: relative;
    opacity: 0;
    animation: smashIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.7s;
  }

  .main-text .f {
    display: inline-block;
    color: var(--green-bright);
    animation: smashIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.7s,
               flicker 4s ease-in-out 1.5s infinite;
  }

  .main-text .u {
    display: inline-block;
    color: var(--green-bright);
  }

  .shadow-text {
    position: absolute;
    inset: 0;
    font-size: clamp(5rem, 20vw, 18rem);
    line-height: 0.85;
    color: transparent;
    -webkit-text-stroke: 1px rgba(45,106,45,0.3);
    transform: translate(6px, 6px);
    pointer-events: none;
    letter-spacing: -0.02em;
  }

  .you {
    display: block;
    font-size: clamp(3rem, 12vw, 10rem);
    color: var(--cream);
    opacity: 0;
    letter-spacing: 0.3em;
    animation: fadeUp 0.4s ease forwards 1.1s;
  }

  .subline {
    font-family: 'Permanent Marker', cursive;
    font-size: clamp(0.9rem, 2.5vw, 1.3rem);
    color: #555;
    margin-top: 3rem;
    letter-spacing: 0.08em;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards 1.5s;
  }

  .subline span {
    color: var(--green-bright);
  }

  /* Big red button */
  .btn {
    display: inline-block;
    margin-top: 3rem;
    padding: 1rem 3rem;
    background: var(--green);
    color: var(--cream);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 0.2em;
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    position: relative;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards 1.9s;
    transition: transform 0.1s ease, background 0.2s ease;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--green-bright);
    transform: translateX(-4px) translateY(4px);
    z-index: -1;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: transform 0.1s ease;
  }

  .btn:hover {
    transform: translateX(2px) translateY(-2px);
    background: #3a8a3a;
  }

  .btn:hover::before {
    transform: translateX(-6px) translateY(6px);
  }

  .btn:active {
    transform: translateX(-2px) translateY(2px);
  }

  /* Sparks on click */
  .spark {
    position: fixed;
    pointer-events: none;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--red);
    animation: spark 0.6s ease-out forwards;
    z-index: 100;
  }

  @keyframes spark {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
  }

  @keyframes smashIn {
    0% { opacity: 0; transform: scale(1.4) rotate(-3deg); }
    60% { transform: scale(0.96) rotate(0.5deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes flicker {
    0%, 93%, 100% { opacity: 1; }
    94% { opacity: 0.6; }
    96% { opacity: 1; }
    98% { opacity: 0.4; }
    99% { opacity: 1; }
  }

  /* Shake on button click */
  @keyframes bigShake {
    0%,100% { transform: translate(0,0) rotate(0); }
    10% { transform: translate(-8px, 4px) rotate(-1deg); }
    20% { transform: translate(8px, -4px) rotate(1deg); }
    30% { transform: translate(-6px, 6px) rotate(-0.5deg); }
    40% { transform: translate(6px, -2px) rotate(0.5deg); }
    50% { transform: translate(-4px, 4px) rotate(-1deg); }
    60% { transform: translate(4px, -4px) rotate(0.5deg); }
    70% { transform: translate(-2px, 2px) rotate(-0.5deg); }
    80% { transform: translate(2px, 0px) rotate(0deg); }
  }

  .shaking {
    animation: bigShake 0.5s ease forwards !important;
  }

  .counter-label {
    font-family: 'Permanent Marker', cursive;
    font-size: 0.8rem;
    color: #444;
    margin-top: 0.8rem;
    letter-spacing: 0.1em;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards 2.1s;
  }

  #count {
    color: var(--green-bright);
  }

  /* Floating middle fingers */
  .floater {
    position: fixed;
    font-size: 2rem;
    opacity: 0;
    pointer-events: none;
    animation: floatUp 2s ease-out forwards;
    z-index: 5;
  }

  @keyframes floatUp {
    0% { opacity: 0.8; transform: translateY(0) rotate(var(--rot)); }
    100% { opacity: 0; transform: translateY(-200px) rotate(var(--rot2)); }
  }
</style>
</head>
<body>
<div class="bg-lines"></div>

<div class="container" id="main">
  <p class="intro">a very special message, just for you:</p>
  <div class="main-text">
    <div class="shadow-text">FUCK</div>
    <span class="f">F</span><span>UCK</span>
    <span class="you">YOU</span>
  </div>
  <p class="subline">con todo amor del mundo <span>-Xinamayca 💚</span></p>
  <button class="btn" id="btn" onclick="sendIt()">SEND IT AGAIN</button>
  <p class="counter-label">sent <span id="count">1</span> time(s)</p>
</div>

<script>
  let count = 1;

  function sendIt() {
    count++;
    document.getElementById('count').textContent = count;

    // Shake the whole page
    const main = document.getElementById('main');
    main.classList.remove('shaking');
    void main.offsetWidth;
    main.classList.add('shaking');

    // Spawn floaters
    for (let i = 0; i < 6; i++) {
      setTimeout(() => spawnFloater(), i * 80);
    }
  }

  function spawnFloater() {
    const el = document.createElement('div');
    el.className = 'floater';
    el.textContent = ['🖕','💥','🔥','😤'][Math.floor(Math.random()*4)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = Math.random() * 60 + 20 + 'vh';
    el.style.setProperty('--rot', (Math.random()-0.5)*30 + 'deg');
    el.style.setProperty('--rot2', (Math.random()-0.5)*60 + 'deg');
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }

  // Click sparks
  document.addEventListener('click', (e) => {
    for (let i = 0; i < 10; i++) {
      const spark = document.createElement('div');
      spark.className = 'spark';
      spark.style.left = e.clientX + 'px';
      spark.style.top = e.clientY + 'px';
      const angle = (Math.PI * 2 / 10) * i;
      const dist = 40 + Math.random() * 60;
      spark.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      spark.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
      spark.style.background = ['#ff1a1a','#2d6a2d','#4a9e4a'][Math.floor(Math.random()*3)];
      document.body.appendChild(spark);
      setTimeout(() => spark.remove(), 600);
    }
  });
</script>
</body>
</html>
